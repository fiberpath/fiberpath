name: Setup Python Environment
description: Sets up Python with uv and installs dependencies

inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.11"
  dependencies:
    description: Dependency groups to install (e.g., ".[dev,api]")
    required: false
    default: ".[dev,api]"
  cache-key-suffix:
    description: Additional suffix for cache key
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Cache Python virtual environment
      uses: actions/cache@v6
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('pyproject.toml') }}-${{ inputs.cache-key-suffix }}
        restore-keys: |
          venv-${{ runner.os }}-${{ inputs.python-version }}-

    - name: Create virtual environment
      shell: bash
      run: |
        if [ -d ".venv" ]; then
          echo "Using restored .venv from cache"
        else
          uv venv
        fi

    - name: Install dependencies
      shell: bash
      run: uv pip install ${{ inputs.dependencies }}
