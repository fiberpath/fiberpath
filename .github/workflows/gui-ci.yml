name: GUI CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fiberpath_gui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js environment
        uses: ./.github/actions/setup-node

      - name: Run TypeScript type check
        run: npm run lint

      - name: Run Stylelint (CSS)
        run: npm run lint:css

      - name: Verify CSS variable definitions
        run: npm run lint:css:vars

  test:
    name: Test & Build
    needs: lint-and-type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fiberpath_gui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js environment
        uses: ./.github/actions/setup-node

      - name: Run Vitest
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./fiberpath_gui/coverage/lcov.info
          flags: gui
          name: gui
          fail_ci_if_error: false

      - name: Build Vite assets
        run: npm run build

      - name: Enforce bundle budget
        run: npm run perf:bundle

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed - no dist directory"
            exit 1
          fi
          echo "Build successful - dist/ directory created"

      - name: Upload bundle metrics artifact
        uses: actions/upload-artifact@v7
        with:
          name: gui-bundle-metrics
          path: fiberpath_gui/perf/reports/bundle-metrics.json
          if-no-files-found: error

      - name: Setup Rust environment
        uses: ./.github/actions/setup-rust
        with:
          install-linux-deps: "true"

      - name: Run Rust formatter check
        run: npm run format:check

      - name: Run Clippy (Rust linter)
        run: npm run clippy

      - name: Run Rust tests
        run: npm run test:rust
